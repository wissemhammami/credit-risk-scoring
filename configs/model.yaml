models:
  - model_type: "logistic_regression"
    params:
      C: 0.01
      max_iter: 1000
      class_weight: "balanced"
      solver: "lbfgs"
      random_state: 42

  - model_type: "random_forest"
    params:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 10
      min_samples_leaf: 5
      class_weight: "balanced"
      random_state: 42
      n_jobs: -1

  - model_type: "xgboost"
    params:
      n_estimators: 200
      max_depth: 5
      learning_rate: 0.1
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 11
      objective: "binary:logistic"
      eval_metric: "logloss"
      random_state: 42
      n_jobs: -1

scoring:
  base_score: 600
  pdo: 50
  odds: 0.05
  threshold_accept: 650
  threshold_review: 600